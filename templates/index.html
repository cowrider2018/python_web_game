<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PWG</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #87ceeb;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            touch-action: none;
            cursor: pointer;
            /* 禁止選取文字（避免反藍） */
            -webkit-user-select: none;  /* Chrome, Safari, Opera */
            -moz-user-select: none;     /* Firefox */
            -ms-user-select: none;      /* IE/Edge */
            user-select: none;

            /* 移除行動裝置點擊時的藍色高亮框 */
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);

            /* 移除長按時出現的系統選單（如儲存圖片） */
            -webkit-touch-callout: none;
        }
        /* 分數：固定在右上角 */
        #scoreDisplay {
            position: fixed;
            top: 12px; right: 16px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
            z-index: 10;
            pointer-events: none;
        }
        #statusText {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0);
            color: white;
            padding: 30px 50px;
            border-radius: 10px;
            font-size: 6vmin;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="scoreDisplay">Score: 0</div>
    <div id="statusText"></div>
    <audio id="p2SoundRoar" preload="auto">
        <source src="{{ url_for('static', filename='audio/p2_upsk.mp3') }}" type="audio/mpeg">
    </audio>

    <!-- 依賴順序：socket.io → config → network → render → input → main -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/network.js') }}"></script>
    <script src="{{ url_for('static', filename='js/render.js') }}"></script>
    <script src="{{ url_for('static', filename='js/input.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    {% if DEBUG %}
    <script id="test_tool" src="{{ url_for('static', filename='test/test_tool.js') }}"></script>
    {% endif %}
</body>
</html>
