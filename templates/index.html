<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>PWG</title>
    <style>
        body   { text-align: center; background-color: #333; color: white; font-family: Arial, sans-serif; }
        canvas { background-color: #87ceeb; border: 5px solid #555; display: block; margin: 20px auto; touch-action: none; position: relative; }
        #statusText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.3);
            color: white;
            padding: 30px 50px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            z-index: 100;
        }
        #statusText:hover {
            background-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div style="position: relative; display: inline-block;">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="statusText"></div>
    </div>
    <h2 id="scoreDisplay">Score: 0</h2>
    <audio id="p2SoundRoar" preload="auto">
        <source src="{{ url_for('static', filename='audio/p2_upsk.mp3') }}" type="audio/mpeg">
    </audio>

    <!-- 依賴順序：socket.io → config → network → render → input → main -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/network.js') }}"></script>
    <script src="{{ url_for('static', filename='js/render.js') }}"></script>
    <script src="{{ url_for('static', filename='js/input.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    {% if DEBUG %}
    <script id="test_tool" src="{{ url_for('static', filename='test/test_tool.js') }}"></script>
    {% endif %}
</body>
</html>
